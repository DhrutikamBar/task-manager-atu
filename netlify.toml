[build]
command = "./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon"
publish = "composeApp/build/dist/wasmJs/productionExecutable"

[build.environment]
# Forcing Java 17 as the primary runner
JAVA_VERSION = "17"
JDK_VERSION = "17"
# Some Netlify images use ASDF for version management
ASDF_JAVA_VERSION = "17"
# Required for modern Kotlin Wasm/JS bundling
NODE_VERSION = "20"